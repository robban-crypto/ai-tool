<!DOCTYPE html>
<html>
<head>

<title>FlowForge AI Toolkit</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
margin:0;
background:#0f1221;
color:white;
}

/* HERO */

.hero{
max-width:1100px;
margin:20px auto 10px auto;
padding:0 20px;
}

.hero img{
width:100%;
border-radius:16px;
box-shadow:0 30px 60px rgba(0,0,0,0.5);
}

/* CONTAINER */

.container{
max-width:950px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.07);
backdrop-filter:blur(20px);
border-radius:16px;
padding:30px;
box-shadow:0 30px 70px rgba(0,0,0,0.5);
margin-top:-40px;
}

/* INPUT */

.api-key input{
width:100%;
padding:14px;
border-radius:8px;
border:none;
font-size:15px;
margin-bottom:20px;
}

/* TOOL SELECTOR */

.tool-selector{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tool-selector button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#2a2f55;
color:white;
cursor:pointer;
font-weight:600;
}

.tool-selector button.active{
background:#5a67ff;
}

/* TEXTAREA */

textarea{
width:100%;
height:180px;
padding:14px;
border-radius:8px;
border:none;
resize:vertical;
font-size:15px;
}

/* BUTTON */

.generate-btn{
margin-top:15px;
padding:14px;
width:100%;
background:#5a67ff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:600;
}

/* RESULTS */

#results{
margin-top:30px;
}

/* SECTION CARD */

.section{
background:#11142a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
position:relative;
}

.section-title{
font-weight:700;
margin-bottom:10px;
color:#8c90ff;
}

.copy-btn{
position:absolute;
top:15px;
right:15px;
background:#5a67ff;
border:none;
padding:6px 12px;
border-radius:6px;
color:white;
cursor:pointer;
font-size:12px;
}

.copy-btn.copied{
background:#2ecc71;
}

/* LOADER */

.loader{
border:4px solid rgba(255,255,255,0.1);
border-top:4px solid #5a67ff;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:40px auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.footer{
margin-top:40px;
text-align:center;
color:#8c90ff;
}

</style>

</head>

<body>


<div class="hero">
<img src="hero.png">
</div>


<div class="container">

<div class="card">

<div class="api-key">
<input id="apikey" type="password" placeholder="Enter your API key">
</div>

<div class="tool-selector">

<button onclick="setTool('repurpose')" class="active" id="repurpose">Repurpose</button>
<button onclick="setTool('hooks')" id="hooks">Hook Generator</button>
<button onclick="setTool('thread')" id="thread">Thread Writer</button>
<button onclick="setTool('newsletter')" id="newsletter">Newsletter</button>

</div>

<textarea id="content" placeholder="Paste your content here..."></textarea>

<button class="generate-btn" onclick="generate()">Generate</button>

<div id="results"></div>

</div>

<div class="footer">
FlowForge AI
</div>

</div>


<script>

let tool="repurpose"

function setTool(selected){

tool=selected

document.querySelectorAll(".tool-selector button").forEach(b=>{
b.classList.remove("active")
})

document.getElementById(selected).classList.add("active")

}


/* RENDER AI SECTIONS */

function renderSections(text){

const container=document.getElementById("results")

container.innerHTML=""

text=text.replace(/## /g,"")

const titles=[
"X THREAD",
"LINKEDIN POST",
"INSTAGRAM CAPTION",
"TIKTOK IDEA",
"YOUTUBE SHORTS IDEA"
]

let sections=[]
let currentTitle=""
let currentContent=[]

text.split("\n").forEach(line=>{

const clean=line.trim()

if(titles.includes(clean)){

if(currentTitle){
sections.push({
title:currentTitle,
content:currentContent.join("\n")
})
}

currentTitle=clean
currentContent=[]

}else{

currentContent.push(line)

}

})

if(currentTitle){
sections.push({
title:currentTitle,
content:currentContent.join("\n")
})
}

sections.forEach(sec=>{

const div=document.createElement("div")
div.className="section"

div.innerHTML=`

<div class="section-title">${sec.title}</div>
<button class="copy-btn">Copy</button>
<div>${sec.content.replace(/\n/g,"<br>")}</div>

`

const btn=div.querySelector(".copy-btn")

btn.onclick=()=>{
navigator.clipboard.writeText(sec.content)

btn.innerText="Copied ✓"
btn.classList.add("copied")

setTimeout(()=>{
btn.innerText="Copy"
btn.classList.remove("copied")
},2000)
}

container.appendChild(div)

})

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
})

}


/* GENERATE */

async function generate(){

const content=document.getElementById("content").value
const apikey=document.getElementById("apikey").value
const results=document.getElementById("results")

if(!apikey){
alert("Enter API key")
return
}

if(!content){
alert("Enter content")
return
}

results.innerHTML=`<div class="loader"></div>`

try{

const response=await fetch("https://api.flowforgeai.app/webhook/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
content:content,
tool:tool,
apikey:apikey
})

})

const data=await response.text()

renderSections(data)

}catch(err){

results.innerHTML="Connection error"

}

}

</script>

</body>
</html>
