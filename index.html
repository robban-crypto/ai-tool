<!DOCTYPE html>
<html>
<head>

<title>AI Creator Toolkit</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f6f7fb;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

h1{
text-align:center;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:40px;
}

.tool-selector{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tool-selector button{
flex:1;
padding:10px;
border:none;
background:#e4e7ff;
cursor:pointer;
border-radius:6px;
}

.tool-selector button.active{
background:#5a67ff;
color:white;
}

textarea{
width:100%;
height:180px;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ddd;
}

.generate-btn{
margin-top:15px;
padding:12px;
width:100%;
background:#5a67ff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:30px;
background:white;
padding:20px;
border-radius:8px;
white-space:pre-wrap;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="container">

<h1>AI Creator Toolkit</h1>
<p class="subtitle">Turn one piece of content into multiple social media assets instantly.</p>

<div class="tool-selector">

<button onclick="setTool('repurpose')" class="active" id="repurpose">Repurpose</button>
<button onclick="setTool('hooks')" id="hooks">Hook Generator</button>
<button onclick="setTool('thread')" id="thread">Thread Writer</button>
<button onclick="setTool('newsletter')" id="newsletter">Newsletter</button>

</div>

<textarea id="content" placeholder="Paste your content here..."></textarea>

<button class="generate-btn" onclick="generate()">Generate</button>

<div class="result" id="result"></div>

</div>

<script>

let tool = "repurpose"

function setTool(selected){

tool = selected

document.querySelectorAll(".tool-selector button").forEach(b=>{
b.classList.remove("active")
})

document.getElementById(selected).classList.add("active")

}

async function generate(){

const content = document.getElementById("content").value
const result = document.getElementById("result")

if(!content){
result.innerText="Please paste content first."
return
}

result.innerText="⏳ Generating..."

try{

const response = await fetch("YOUR_WEBHOOK_URL",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:content,
tool:tool
})
})

const data = await response.text()

result.innerText=data

}catch(err){

result.innerText="Error connecting to AI"

}

}

</script>

</body>
</html>
