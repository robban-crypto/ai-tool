<!DOCTYPE html>
<html>
<head>

<title>AI Social Media Toolkit</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
margin:0;
background:linear-gradient(180deg,#0f1221,#1c2147);
color:white;
}

.container{
max-width:950px;
margin:auto;
padding:20px 20px;
}

.hero{
text-align:center;
margin-bottom:40px;
}

.hero img{
width:100%;
max-height:320px;
object-fit:cover;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-top:30px;
font-size:36px;
}

.subtitle{
text-align:center;
color:#aab0ff;
margin-bottom:40px;
}

.card{
background:white;
color:#111;
padding:30px;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.tool-selector{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tool-selector button{
flex:1;
padding:10px;
border:none;
background:#e9ecff;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.tool-selector button.active{
background:#5a67ff;
color:white;
}

textarea{
width:100%;
height:180px;
padding:14px;
font-size:15px;
border-radius:8px;
border:1px solid #ddd;
resize:vertical;
}

.generate-btn{
margin-top:15px;
padding:14px;
width:100%;
background:#5a67ff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:600;
}

.generate-btn:hover{
background:#4854ff;
}

.result{
margin-top:30px;
background:#f6f7fb;
padding:20px;
border-radius:8px;
white-space:pre-wrap;
min-height:120px;
}

.api-key{
margin-bottom:20px;
}

.api-key input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

.footer{
margin-top:40px;
text-align:center;
color:#8c90ff;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="hero">
<img src="hero.png" alt="AI Social Media Toolkit">
</div>

<h1>AI Social Media Toolkit</h1>

<p class="subtitle">
Turn one piece of content into multiple social media assets instantly.
</p>

<div class="card">

<div class="api-key">
<input id="apikey" placeholder="Enter your API key (required)">
</div>

<div class="tool-selector">

<button onclick="setTool('repurpose')" class="active" id="repurpose">Repurpose</button>
<button onclick="setTool('hooks')" id="hooks">Hook Generator</button>
<button onclick="setTool('thread')" id="thread">Thread Writer</button>
<button onclick="setTool('newsletter')" id="newsletter">Newsletter</button>

</div>

<textarea id="content" placeholder="Paste your content here..."></textarea>

<button class="generate-btn" onclick="generate()">Generate</button>

<div class="result" id="result"></div>

</div>

<div class="footer">
Powered by DadStrength AI
</div>

</div>

<script>

let tool = "repurpose"

function setTool(selected){

tool = selected

document.querySelectorAll(".tool-selector button").forEach(b=>{
b.classList.remove("active")
})

document.getElementById(selected).classList.add("active")

}

async function generate(){

const content = document.getElementById("content").value
const apikey = document.getElementById("apikey").value
const result = document.getElementById("result")

if(!apikey){
result.innerText="Please enter your API key."
return
}

if(!content){
result.innerText="Please paste content first."
return
}

result.innerText="⏳ Generating..."

try{

const response = await fetch("http://89.167.81.155:5678/webhook/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:content,
tool:tool,
apikey:apikey
})
})

const data = await response.text()

result.innerText=data

}catch(err){

result.innerText="Error connecting to AI"

}

}

</script>

</body>
</html>
