<!DOCTYPE html>
<html>
<head>

<title>AI Social Media Toolkit</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
margin:0;
background:#0f1221;
color:white;
}

/* HERO */

.hero{
max-width:1100px;
margin:20px auto 10px auto;
padding:0 20px;
}

.hero img{
width:100%;
border-radius:16px;
box-shadow:0 30px 60px rgba(0,0,0,0.5);
}

/* CONTAINER */

.container{
max-width:950px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.07);
backdrop-filter:blur(20px);
border-radius:16px;
padding:30px;
box-shadow:0 30px 70px rgba(0,0,0,0.5);
margin-top:-40px;
}

/* INPUT */

.api-key input{
width:100%;
padding:14px;
border-radius:8px;
border:none;
font-size:15px;
margin-bottom:20px;
}

/* TOOL SELECTOR */

.tool-selector{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tool-selector button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#2a2f55;
color:white;
cursor:pointer;
font-weight:600;
}

.tool-selector button.active{
background:#5a67ff;
}

/* TEXTAREA */

textarea{
width:100%;
height:180px;
padding:14px;
border-radius:8px;
border:none;
resize:vertical;
font-size:15px;
}

/* GENERATE BUTTON */

.generate-btn{
margin-top:15px;
padding:14px;
width:100%;
background:#5a67ff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:600;
}

/* COPY BUTTON */

.copy-btn{
margin-top:20px;
background:#5a67ff;
border:none;
padding:10px 16px;
border-radius:6px;
color:white;
cursor:pointer;
font-size:14px;
transition:0.2s;
}

.copy-btn.copied{
background:#22c55e;
}

/* RESULT */

.result{
margin-top:15px;
background:#11142a;
padding:20px;
border-radius:8px;
white-space:pre-wrap;
min-height:120px;
font-family:monospace;
max-height:400px;
overflow-y:auto;
}

/* FOOTER */

.footer{
margin-top:40px;
text-align:center;
color:#8c90ff;
font-size:14px;
}

</style>

</head>

<body>

<div class="hero">
<img src="hero.png">
</div>

<div class="container">

<div class="card">

<div class="api-key">
<input id="apikey" type="password" placeholder="Enter your API key">
</div>

<div class="tool-selector">

<button onclick="setTool('repurpose')" class="active" id="repurpose">Repurpose</button>
<button onclick="setTool('hooks')" id="hooks">Hook Generator</button>
<button onclick="setTool('thread')" id="thread">Thread Writer</button>
<button onclick="setTool('newsletter')" id="newsletter">Newsletter</button>

</div>

<textarea id="content" placeholder="Paste your content here..."></textarea>

<button class="generate-btn" onclick="generate()">Generate</button>

<button class="copy-btn" id="copyBtn" onclick="copyResult()">Copy Result</button>

<div class="result" id="result"></div>

</div>

<div class="footer">
FlowForge
</div>

</div>

<script>

let tool="repurpose"

function setTool(selected){

tool=selected

document.querySelectorAll(".tool-selector button").forEach(b=>{
b.classList.remove("active")
})

document.getElementById(selected).classList.add("active")

}

/* COPY */

function copyResult(){

const text=document.getElementById("result").innerText
const btn=document.getElementById("copyBtn")

navigator.clipboard.writeText(text)

btn.innerText="Copied ✓"
btn.classList.add("copied")

setTimeout(()=>{
btn.innerText="Copy Result"
btn.classList.remove("copied")
},2000)

}

/* TYPEWRITER + AUTOSCROLL */

function typeWriter(text){

const result=document.getElementById("result")

result.innerText=""

let i=0

function typing(){

if(i<text.length){

result.innerText+=text.charAt(i)

result.scrollTop=result.scrollHeight

i++

setTimeout(typing,10)

}

}

typing()

}

/* GENERATE */

async function generate(){

const content=document.getElementById("content").value
const apikey=document.getElementById("apikey").value
const result=document.getElementById("result")

if(!apikey){
result.innerText="Please enter your API key."
return
}

if(!content){
result.innerText="Please paste content first."
return
}

result.innerText="⚡ AI thinking..."

try{

const response=await fetch("https://api.flowforgeai.app/webhook/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
content:content,
tool:tool,
apikey:apikey
})

})

const data=await response.text()

typeWriter(data)

}catch(err){

result.innerText="Error connecting to AI"

}

}

</script>

</body>
</html>
