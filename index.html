<!DOCTYPE html>
<html>
<head>

<title>AI Social Media Toolkit</title>

<style>

body{
font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
background:linear-gradient(180deg,#0f1221,#1b1f3b);
margin:0;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:60px 30px;
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:90px;
}

h1{
text-align:center;
margin:10px 0;
font-size:34px;
}

.subtitle{
text-align:center;
color:#b6b9ff;
margin-bottom:40px;
}

.card{
background:#ffffff;
border-radius:12px;
padding:30px;
box-shadow:0 20px 40px rgba(0,0,0,0.35);
}

.tool-selector{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tool-selector button{
flex:1;
padding:10px;
border:none;
background:#eef0ff;
cursor:pointer;
border-radius:6px;
font-weight:600;
}

.tool-selector button.active{
background:#5a67ff;
color:white;
}

textarea{
width:100%;
height:180px;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ddd;
}

.generate-btn{
margin-top:15px;
padding:14px;
width:100%;
background:#5a67ff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:600;
}

.generate-btn:hover{
background:#4854ff;
}

.result{
margin-top:30px;
background:#f6f7fb;
padding:20px;
border-radius:8px;
white-space:pre-wrap;
color:#111;
min-height:120px;
}

.footer{
margin-top:40px;
text-align:center;
color:#888cff;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="https://i.imgur.com/7xY9F5W.png">
</div>

<h1>AI Social Media Toolkit</h1>

<p class="subtitle">
Turn one piece of content into multiple social media assets instantly.
</p>

<div class="card">

<div class="tool-selector">

<button onclick="setTool('repurpose')" class="active" id="repurpose">Repurpose</button>
<button onclick="setTool('hooks')" id="hooks">Hook Generator</button>
<button onclick="setTool('thread')" id="thread">Thread Writer</button>
<button onclick="setTool('newsletter')" id="newsletter">Newsletter</button>

</div>

<textarea id="content" placeholder="Paste your content here..."></textarea>

<button class="generate-btn" onclick="generate()">Generate</button>

<div class="result" id="result"></div>

</div>

<div class="footer">
Powered by DadStrength AI
</div>

</div>

<script>

let tool = "repurpose"

function setTool(selected){

tool = selected

document.querySelectorAll(".tool-selector button").forEach(b=>{
b.classList.remove("active")
})

document.getElementById(selected).classList.add("active")

}

async function generate(){

const content = document.getElementById("content").value
const result = document.getElementById("result")

if(!content){
result.innerText="Please paste content first."
return
}

result.innerText="⏳ Generating..."

try{

const response = await fetch("http://89.167.81.155:5678/webhook/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:content,
tool:tool
})
})

const data = await response.text()

result.innerText=data

}catch(err){

result.innerText="Error connecting to AI"

}

}

</script>

</body>
</html>
