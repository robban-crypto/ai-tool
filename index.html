<!DOCTYPE html>
<html>
<head>
<title>AI Content Repurposer</title>

<style>
body{
font-family: Arial, sans-serif;
max-width: 700px;
margin: 40px auto;
padding: 20px;
}

textarea{
width:100%;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:20px;
white-space:pre-wrap;
background:#f4f4f4;
padding:15px;
border-radius:6px;
}
</style>

</head>

<body>

<h2>AI Content Repurposer</h2>

<textarea id="content" rows="10" placeholder="Paste your article or text here"></textarea>

<br><br>

<button id="generateBtn" onclick="generate()">Generate Content</button>

<pre id="result"></pre>

<script>

async function generate() {

const button = document.getElementById("generateBtn");
const result = document.getElementById("result");
const content = document.getElementById("content").value;

if(!content){
result.innerText = "Please paste some content first.";
return;
}

button.disabled = true;
button.innerText = "Generating...";

result.innerText = "⏳ AI is generating content...";

try{

const response = await fetch("https://parts-excess-suse-somewhat.trycloudflare.com/webhook-test/generate", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ content })
});

const data = await response.json();

result.innerText = data.output;

}catch(error){

result.innerText = "❌ Error connecting to AI service.";

}

button.disabled = false;
button.innerText = "Generate Content";

}

</script>

</body>
</html>
