<!DOCTYPE html>
<html>
<head>

<title>AI Social Media Toolkit</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
margin:0;
background:#0f1221;
color:white;
}

/* HERO */

.hero{
background-image:url("hero.png");
background-size:cover;
background-position:center;
padding:120px 20px 100px 20px;
text-align:center;
}

.hero h1{
font-size:42px;
margin:0;
}

.hero p{
color:#c9ccff;
margin-top:10px;
font-size:18px;
}

/* CONTAINER */

.container{
max-width:950px;
margin:auto;
padding:40px 20px;
}

/* GLASS CARD */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
border-radius:14px;
padding:30px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

/* API KEY */

.api-key{
margin-bottom:20px;
}

.api-key input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
font-size:15px;
}

/* TOOL SELECTOR */

.tool-selector{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.tool-selector button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:#2a2f55;
color:white;
cursor:pointer;
font-weight:600;
}

.tool-selector button.active{
background:#5a67ff;
}

/* TEXTAREA */

textarea{
width:100%;
height:180px;
padding:14px;
border-radius:8px;
border:none;
resize:vertical;
font-size:15px;
}

/* BUTTON */

.generate-btn{
margin-top:15px;
padding:14px;
width:100%;
background:#5a67ff;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.generate-btn:hover{
background:#4854ff;
}

/* RESULT */

.result{
margin-top:30px;
background:#11142a;
padding:20px;
border-radius:8px;
white-space:pre-wrap;
min-height:120px;
position:relative;
}

/* COPY BUTTON */

.copy-btn{
position:absolute;
top:10px;
right:10px;
background:#5a67ff;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer;
font-size:12px;
}

/* LOADING */

.loading{
opacity:0.6;
}

/* FOOTER */

.footer{
margin-top:40px;
text-align:center;
color:#8c90ff;
font-size:14px;
}

</style>

</head>

<body>

<div class="hero">

<h1>AI Social Media Toolkit</h1>

<p>
Turn one piece of content into multiple social media assets instantly.
</p>

</div>

<div class="container">

<div class="card">

<div class="api-key">
<input id="apikey" placeholder="Enter your API key (required)">
</div>

<div class="tool-selector">

<button onclick="setTool('repurpose')" class="active" id="repurpose">Repurpose</button>
<button onclick="setTool('hooks')" id="hooks">Hook Generator</button>
<button onclick="setTool('thread')" id="thread">Thread Writer</button>
<button onclick="setTool('newsletter')" id="newsletter">Newsletter</button>

</div>

<textarea id="content" placeholder="Paste your content here..."></textarea>

<button class="generate-btn" onclick="generate()">Generate</button>

<div class="result" id="result">
<button class="copy-btn" onclick="copyResult()">Copy</button>
</div>

</div>

<div class="footer">
Powered by DadStrength AI
</div>

</div>

<script>

let tool = "repurpose"

function setTool(selected){

tool = selected

document.querySelectorAll(".tool-selector button").forEach(b=>{
b.classList.remove("active")
})

document.getElementById(selected).classList.add("active")

}

/* COPY BUTTON */

function copyResult(){

const text = document.getElementById("result").innerText

navigator.clipboard.writeText(text)

}

/* GENERATE */

async function generate(){

const content = document.getElementById("content").value
const apikey = document.getElementById("apikey").value
const result = document.getElementById("result")

if(!apikey){
result.innerText="Please enter your API key."
return
}

if(!content){
result.innerText="Please paste content first."
return
}

result.innerText="⏳ Generating..."
result.classList.add("loading")

try{

const response = await fetch("http://89.167.81.155:5678/webhook/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

content:content,
tool:tool,
apikey:apikey

})

})

const data = await response.text()

result.classList.remove("loading")

result.innerText=data

}catch(err){

result.classList.remove("loading")

result.innerText="Error connecting to AI"

}

}

</script>

</body>
</html>
